<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Currículo Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary: #3b5284;
            --secondary: #2c3e50;
            --accent: #27ae60;
            --text: #333;
            --light-gray: #f1f3f5;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; }

        .editor-panel {
            width: 480px; background: #fff; border-right: 1px solid #ddd;
            overflow-y: auto; padding: 20px;
        }

        .preview-panel {
            flex: 1; background: #525659; overflow-y: auto;
            display: flex; justify-content: center; padding: 40px 20px;
        }

        .section-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .section-box h3 { margin-top: 0; font-size: 15px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 8px; color: #666; text-transform: uppercase; }
        input, textarea, select {
            width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 13px; background: white;
        }

        .btn-add { background: var(--primary); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 18px; line-height: 1; }
        .btn-remove { background: #dc3545; color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; float: right; margin-bottom: 5px; }

        .toolbar { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-model { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; font-weight: bold; }
        .btn-model.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-download { background: var(--accent); color: white; padding: 15px; border: none; border-radius: 6px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }

        #cv-a4 { 
            width: 210mm; 
            min-height: 297mm; 
            background: white; 
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .mode-agro { display: grid; grid-template-columns: 280px 1fr; min-height: 297mm; }
        .mode-agro .sidebar { background: #f4f7f9; color: var(--primary); }
        .mode-agro .sidebar-header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%); }
        .mode-agro .sidebar-header h1 { font-size: 22px; margin: 0; word-wrap: break-word; text-transform: uppercase; }
        .mode-agro .content { padding: 40px; color: var(--text); }
        .mode-agro h2 { border-bottom: 2px solid #ddd; padding-bottom: 5px; color: var(--primary); font-size: 18px; text-transform: uppercase; margin-top: 25px; }
        .mode-agro .info-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .mode-agro .info-item i { width: 20px; color: var(--primary); }

        .mode-modern { padding: 45px; color: #333; width: 100%; min-height: 297mm; }
        .mode-modern .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .mode-modern .header h1 { margin: 0; color: var(--secondary); font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }
        .mode-modern .header p { margin: 5px 0; color: #666; font-size: 13px; }
        .mode-modern .grid { display: grid; grid-template-columns: 1fr 250px; gap: 35px; }
        .mode-modern h2 { border-left: 4px solid var(--secondary); padding-left: 10px; text-transform: uppercase; font-size: 15px; color: var(--secondary); margin-bottom: 15px; margin-top: 20px; }
        
        .skill-pill { display: inline-block; background: var(--light-gray); color: #444; padding: 4px 10px; border-radius: 15px; font-size: 11px; margin: 3px; font-weight: 600; text-transform: uppercase; }
        .cert-row { display: flex; align-items: flex-start; margin-bottom: 8px; font-size: 12px; }
        .cert-row i { color: var(--accent); margin-right: 8px; margin-top: 3px; }

        .justified { text-align: justify; line-height: 1.5; font-size: 13px; }
        .item-title { font-weight: bold; display: block; font-size: 14px; }
        .item-sub { color: #555; font-style: italic; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="editor-panel">
        <div class="toolbar">
            <button class="btn-model active" onclick="setModelo('agro', this)">Modelo Agro</button>
            <button class="btn-model" onclick="setModelo('modern', this)">Modelo Moderno</button>
        </div>

        <div class="section-box">
            <h3>Dados Pessoais</h3>
            <label>Nome Completo</label>
            <input type="text" id="fnome" oninput="render()" value="Mariana Lopes Andrade">
            <label>E-mail</label>
            <input type="text" id="femail" oninput="render()" value="mariana.andrade.contato@emailficticio.com">
            <label>Telefone</label>
            <input type="text" id="ffone" oninput="render()" value="+55 (67) 98874-3210">
            <label>Endereço</label>
            <input type="text" id="fend" oninput="render()" value="Dourados – MS">
        </div>

        <div class="section-box">
            <h3>Resumo e Objetivo</h3>
            <label>O que deseja exibir?</label>
            <select id="fmodo_resumo" onchange="toggleResumoObjetivo()">
                <option value="resumo">Apenas Resumo Profissional</option>
                <option value="objetivo">Apenas Objetivo</option>
                <option value="ambos" selected>Resumo e Objetivo</option>
            </select>

            <div id="box-resumo">
                <label>Resumo Profissional</label>
                <textarea id="fresumo" rows="3" oninput="render()">"Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. "< /textarea>
            </div>

            <div id="box-objetivo">
                <label>Objetivo</label>
                <textarea id="fobjetivo" rows="2" oninput="render()">"Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua." </textarea>
            </div>
        </div>

        <div class="section-box">
            <h3>Experiência <button class="btn-add" onclick="addItem('experiencia')">+</button></h3>
            <div id="list-experiencia"></div>
        </div>

        <div class="section-box">
            <h3>Formação <button class="btn-add" onclick="addItem('formacao')">+</button></h3>
            <div id="list-formacao"></div>
        </div>

        <div class="section-box">
            <h3>Certificados <button class="btn-add" onclick="addItem('certificados')">+</button></h3>
            <div id="list-certificados"></div>
        </div>

        <div class="section-box">
            <h3>Habilidades (separe por vírgula)</h3>
            <input type="text" id="fhab" oninput="render()" value="adaptabilidade, inteligência emocional, Comunicação, Trabalho em Equipe">
        </div>

        <button class="btn-download" onclick="exportarPDF()">BAIXAR PDF</button>
    </div>

    <div class="preview-panel">
        <div id="cv-a4"></div>
    </div>
</div>

<script>
    let currentModel = 'agro';
    let data = {
        formacao: [{ 
            curso: 'curso', 
            local: 'local de ensino', 
            desc: 'descrição' 
        }],
        experiencia: [{ 
            cargo: 'cargo', 
            local: 'local de trabalho', 
            data: 'ano de inicio - Atual/ano de desligamento', 
            desc: 'descrição' 
        }],
        certificados: [
            { nome: 'curso de ... (80h)' }, 
            { nome: 'Certificação em ...' }]
    };

    function toggleResumoObjetivo() {
        const modo = document.getElementById('fmodo_resumo').value;
        document.getElementById('box-resumo').style.display = (modo === 'resumo' || modo === 'ambos') ? 'block' : 'none';
        document.getElementById('box-objetivo').style.display = (modo === 'objetivo' || modo === 'ambos') ? 'block' : 'none';
        render();
    }

    function addItem(type) {
        if(type === 'formacao') data.formacao.push({ curso: '', local: '', data: '', desc: '' });
        else if(type === 'experiencia') data.experiencia.push({ cargo: '', local: '', data: '', desc: '' });
        else data.certificados.push({ nome: '' });
        updateInputs();
        render();
    }

    function removeItem(type, index) {
        data[type].splice(index, 1);
        updateInputs();
        render();
    }

    function updateInputs() {
        document.getElementById('list-formacao').innerHTML = data.formacao.map((item, i) => `
            <div style="border-bottom:1px solid #ddd; margin-bottom:10px; padding-bottom:10px">
                <button class="btn-remove" onclick="removeItem('formacao', ${i})">×</button>
                <input type="text" placeholder="Curso" value="${item.curso}" oninput="data.formacao[${i}].curso=this.value; render()">
                <input type="text" placeholder="Instituição" value="${item.local}" oninput="data.formacao[${i}].local=this.value; render()">
                <input type="text" placeholder="Período" value="${item.data}" oninput="data.formacao[${i}].data=this.value; render()">
                <textarea placeholder="Descrição" oninput="data.formacao[${i}].desc=this.value; render()">${item.desc}</textarea>
            </div>`).join('');

        document.getElementById('list-experiencia').innerHTML = data.experiencia.map((item, i) => `
            <div style="border-bottom:1px solid #ddd; margin-bottom:10px; padding-bottom:10px">
                <button class="btn-remove" onclick="removeItem('experiencia', ${i})">×</button>
                <input type="text" placeholder="Cargo" value="${item.cargo}" oninput="data.experiencia[${i}].cargo=this.value; render()">
                <input type="text" placeholder="Empresa" value="${item.local}" oninput="data.experiencia[${i}].local=this.value; render()">
                <input type="text" placeholder="Período" value="${item.data}" oninput="data.experiencia[${i}].data=this.value; render()">
                <textarea placeholder="Descrição" oninput="data.experiencia[${i}].desc=this.value; render()">${item.desc}</textarea>
            </div>`).join('');

        document.getElementById('list-certificados').innerHTML = data.certificados.map((item, i) => `
            <div style="display:flex; gap:5px; margin-bottom:5px">
                <input type="text" placeholder="Certificado" value="${item.nome}" oninput="data.certificados[${i}].nome=this.value; render()">
                <button class="btn-remove" style="float:none" onclick="removeItem('certificados', ${i})">×</button>
            </div>`).join('');
    }

    function setModelo(m, btn) {
        currentModel = m;
        document.querySelectorAll('.btn-model').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const cv = document.getElementById('cv-a4');
        const nome = document.getElementById('fnome').value;
        const email = document.getElementById('femail').value;
        const fone = document.getElementById('ffone').value;
        const end = document.getElementById('fend').value;
        const habs = document.getElementById('fhab').value.split(',');
        
        const modo = document.getElementById('fmodo_resumo').value;
        const resumo = document.getElementById('fresumo').value;
        const objetivo = document.getElementById('fobjetivo').value;

        // Bloco de HTML condicional para as seções
        let secoesIniciais = '';
        if(modo === 'resumo' || modo === 'ambos') {
            secoesIniciais += `<section><h2>Resumo Profissional</h2><p class="justified">${resumo}</p></section>`;
        }
        if(modo === 'objetivo' || modo === 'ambos') {
            secoesIniciais += `<section><h2>Objetivo</h2><p class="justified">${objetivo}</p></section>`;
        }

        if (currentModel === 'agro') {
            cv.className = 'mode-agro';
            cv.innerHTML = `
                <div class="sidebar">
                    <div class="sidebar-header"><h1>${nome}</h1></div>
                    <div style="padding:25px">
                        <div class="info-item"><i class="fa fa-envelope"></i> ${email}</div>
                        <div class="info-item"><i class="fa fa-phone"></i> ${fone}</div>
                        <div class="info-item"><i class="fa fa-map-marker"></i> ${end}</div>
                        <h2>Habilidades</h2>
                        <ul style="padding-left:18px">${habs.map(h => h.trim() ? `<li>${h.trim()}</li>` : '').join('')}</ul>
                        ${data.certificados.length > 0 ? `<h2>Certificados</h2><ul style="padding-left:18px">${data.certificados.map(c => c.nome ? `<li>${c.nome}</li>` : '').join('')}</ul>` : ''}
                    </div>
                </div>
                <div class="content">
                    ${secoesIniciais}
                    <section><h2>Experiência Profissional</h2>
                        ${data.experiencia.map(e => `<div style="margin-bottom:15px"><span class="item-title">${e.cargo}</span><span class="item-sub">${e.local} | ${e.data}</span><p class="justified">${e.desc}</p></div>`).join('')}
                    </section>
                    <section><h2>Formação</h2>
                        ${data.formacao.map(f => `<div style="margin-bottom:15px"><span class="item-title">${f.curso}</span><span class="item-sub">${f.local} | ${f.data}</span><p class="justified">${f.desc}</p></div>`).join('')}
                    </section>
                </div>`;
        } else {
            cv.className = 'mode-modern';
            cv.innerHTML = `
                <div class="header">
                    <h1>${nome}</h1>
                    <p>${email} • ${fone} • ${end}</p>
                </div>
                ${secoesIniciais}
                <div class="grid">
                    <div class="col-left">
                        <section>
                            <h2>Experiência Profissional</h2>
                            ${data.experiencia.map(e => `<div style="margin-bottom:15px"><b class="item-title">${e.cargo}</b><i class="item-sub">${e.local} | ${e.data}</i><p class="justified">${e.desc}</p></div>`).join('')}
                        </section>
                        <section>
                            <h2>Formação Acadêmica</h2>
                            ${data.formacao.map(f => `<div style="margin-bottom:15px"><b class="item-title">${f.curso}</b><i class="item-sub">${f.local} | ${f.data}</i><p class="justified">${f.desc}</p></div>`).join('')}
                        </section>
                    </div>
                    <div class="col-right">
                        <section>
                            <h2>Habilidades</h2>
                            <div style="margin-top:10px">
                                ${habs.map(h => h.trim() ? `<span class="skill-pill">${h.trim()}</span>` : '').join('')}
                            </div>
                        </section>
                        <section>
                            <h2>Certificados</h2>
                            <div style="margin-top:10px">
                                ${data.certificados.map(c => c.nome ? `<div class="cert-row"><i class="fa fa-certificate"></i><span>${c.nome}</span></div>` : '').join('')}
                            </div>
                        </section>
                    </div>
                </div>`;
        }
    }

    function exportarPDF() {
        const element = document.getElementById('cv-a4');
        const opt = {
            margin: 0,
            filename: 'curriculo.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    updateInputs();
    render();
</script>
</body>
</html>
